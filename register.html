<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./register-style.css">
</head>
<body>
    <div class="title">
        <h2>Đăng ký tài khoản</h2><br>
        <p>Đăng ký tài khoản để sử dụng dịch vụ</p><br>
    </div>
    <div class="name">
        <form action="">
            <label for="">Họ và tên đệm</label><br>
            <input type="text">
        </form>
        <form action="">
            <label for="">Tên</label><br>
            <input type="text">
        </form>
    </div>

    <div class="email-password">
        <form action="">
            <label for="email">Email</label><br>
            <input type="text" placeholder="you@company.com">
        </form>
        <form action="">
            <label for="password">Mật khẩu</label><br>
            <input type="password">
        </form>
        <form action="">
            <label for="password">Xác nhận mật khẩu</label><br>
            <input type="password">
        </form>
    </div>
    <div class="container">
        <form action="">
            <input type="checkbox">
            <label for="agree">Bạn đồng ý với <a href="">chính sách và điều khoản</a></label>
        </form>
        <div class="register">
            <button class="btn-register">Đăng ký</button>
        </div>
        <div class="login-text">
            <p>Bạn đã có tài khoản? <a href="">Đăng nhập</a></p>
        </div>
    </div>
    

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="container">
        
        <form action="" class="login-input" id="login-input">
           <h1>Đăng nhập</h1><br>
           <p>Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p><br><br>
           <label for="email"><b>Email</b></label><br>
           <input id="email" type="text"><br><br>
           <label for="password"><b>Mật khẩu</b></label><br>
           <input id="password" type="password"><br><br>
           <input type="checkbox">
           <label for="">Nhớ tài khoản</label>        
           <a href="">Quên mật khẩu?</a><br><br>   
           <button class="btn-login" type="submit">Đăng nhập</button><br><br>
           <p class="comment" style="text-align: center;">Bạn chưa có tài khoản? <a href="./register.html">Đăng ký</a></p>
        </form>
        
    </div>

    <script src="../js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/register-style.css">
</head>
<body>
    <div class="title">
        <h2>Đăng ký tài khoản</h2><br>
        <p>Đăng ký tài khoản để sử dụng dịch vụ</p><br>
    </div>
    <div class="name">
        <form action="">
            <label for="">Họ và tên đệm</label><br>
            <input id="first-name" type="text">
        </form>
        <form action="">
            <label for="">Tên</label><br>
            <input id="last-name" type="text">
        </form>
    </div>

    <div class="email-password">
        <form action="">
            <label for="">Email</label><br>
            <input id="email" type="text" placeholder="you@company.com">
        </form>
        <form action="">
            <label for="">Mật khẩu</label><br>
            <input id="password" type="password">
        </form>
        <form action="">
            <label for="">Xác nhận mật khẩu</label><br>
            <input id="re-password" type="password"><br>
        </form>
    </div>
    <div class="container">
        <form action="">
            <input type="checkbox">
            <label for="">Bạn đồng ý với <a href="">chính sách và điều khoản</a></label>
        </form>
        <form class="register" id="form-register">
            <button class="btn-register" type="submit">Đăng ký</button>
        </form>
        <div class="login-text">
            <p>Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a></p>
        </div>
    </div>
    
    <script src="../js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
        <div class="menu">
            <h4>&#x1F525 Ecommerce</h4>
            <button style="background-color: white; border: none;">&#8962 Thống kê</button><br>
            <button style="background-color: white; border: none;"><img height="20" width="20" src="https://static.vecteezy.com/system/resources/previews/060/564/621/non_2x/requirement-icon-symbol-art-vector.jpg" alt="">Danh mục</button><br>
            <button style="background-color: white; border: none;">&#128193 Sản phẩm</button><br>
            <button id="btn-logout">Đăng xuất</button>    
            
        </div>
    </nav>

    <div class="ecommerce">
         <span style="position: absolute; right: 10px;">&#128276 <img height="20" width="20" src="./img/avarta.png" alt="avarta"></span><br>
          <hr>
          <h3>Danh mục</h3>

    
        <button class="btn-add">Thêm mới danh mục</button>
    

    <select class="state" name="" id="">
        <option value="">Tất cả</option>
        <option value="">Đang hoạt động</option>
        <option value="">Ngừng hoạt động</option>
    </select>
    <input class="search" type="text" placeholder="Tìm kiếm danh mục" id="input-search">
    <table class="table-ecommerce" border="1" cellspacing="0" cellpadding="20" style="border-collapse: collapse;">
        <thead style="background-color: #F9FAFB;">
            <tr style="border: none;">
                <th>Mã danh mục</th>
                <th>Tên danh mục</th>
                <th>Trạng thái</th>
                <th>Chức năng</th>
            </tr>
        </thead>
        <tbody id="table-categories">
            <tr style="border: none;">
                <td>DM001</td>
                <td>Quần áo</td>
                <td>Đang hoạt động</td>
                <td>
                    <button id="btn-delete" style="background-color: white; border: none;"><img height="50" width="50" src="https://thumbs.dreamstime.com/b/%C3%ADcone-vermelho-da-linha-lixeira-no-fundo-branco-ilustra%C3%A7%C3%A3o-vetorial-de-estilo-plano-171177844.jpg" alt="Xoa"></button>
                    <button id="btn-update" type="submit" style="background-color: white; border: none;"><img height="30" width="30" src="https://static.vecteezy.com/system/resources/previews/050/307/148/large_2x/pencil-icon-design-illustration-vector.jpg" alt="Sua"></button>
                </td>
            </tr>
            
        </tbody>
    </table>
    </div>

    <div class="overlay">
      <div class="modal">
        <form id="form-addProduct" class="modal-body">
            <h3>Thêm mới danh mục</h3><br>
        <label>Mã danh mục</label><br><br>
          <input type="text" name="productId"><br><br>
          <p id="test-id" style="color: red; font-size: 9px;"></p>
          <label>Tên danh mục</label><br><br>
          <input type="text" name="productName"><br><br>
          <p id="test-name" style="color: red; font-size: 9px;"></p>
          <span>Trạng thái</span><br>
          <input type="checkbox">
          <label >Đang hoạt động</label>
          <input type="checkbox">
          <label >Ngừng hoạt động</label><br><br>
          <button class="btn-add" type="submit">Thêm</button>

          <span class="btn-close">x</span>
        </form>
      </div>    
    </div>


    <div class="overlay-update">
      <div id="form-edit" class="modal-update" style="display: none;">
        <form id="field-input" class="modal-body-update">
            <h3>Cập nhật danh mục</h3><br>
        <label>Mã danh mục</label><br><br>
          <input type="text" name="productId"><br><br>
          <label>Tên danh mục</label><br><br>
          <input type="text" name="productName"><br><br>
          <span>Trạng thái</span><br>
          <input type="checkbox">
          <label >Đang hoạt động</label>
          <input type="checkbox">
          <label >Ngừng hoạt động</label><br><br>
          <button id="btn-save" type="submit">Lưu</button>

          <span class="btn-update-close">x</span>
        </form>
      </div> 
   </div>


    <script src="./js/main.js"></script>
</body>
</html>
